<!DOCTYPE html>
<html lang="nl" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoL Champion Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body>

    <header class="header">
      <div class="header__logo">
        <span class="logo-icon">⚔️</span>
        <h1 class="logo-title">LoL <span>Champion Explorer</span></h1>
      </div>
      <div class="header__actions">
        <button class="btn btn--icon" id="btn-favorites" title="Favorieten" aria-label="Favorieten bekijken">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span class="badge" id="favorites-badge" hidden>0</span>
        </button>
        <button class="btn btn--icon" id="btn-theme" title="Thema wisselen" aria-label="Thema wisselen">
          <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <section class="filters-section">
      <form class="search-form" id="search-form" novalidate>
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Zoek een champion…" autocomplete="off" aria-label="Zoek op naam" />
          <button type="button" class="btn btn--clear-search" id="btn-clear-search" title="Wissen" hidden>✕</button>
          <button type="submit" class="btn btn--primary btn--sm">Zoeken</button>
        </div>
        <p class="form-error" id="search-error" role="alert" aria-live="polite"></p>
      </form>

      <div class="filter-controls">
        <select id="filter-role" class="select" aria-label="Filter op rol">
          <option value="">Alle rollen</option>
          <option value="Fighter">Fighter</option>
          <option value="Tank">Tank</option>
          <option value="Mage">Mage</option>
          <option value="Assassin">Assassin</option>
          <option value="Support">Support</option>
          <option value="Marksman">Marksman</option>
        </select>

        <select id="filter-difficulty" class="select" aria-label="Filter op moeilijkheid">
          <option value="">Alle niveaus</option>
          <option value="easy">Gemakkelijk</option>
          <option value="medium">Gemiddeld</option>
          <option value="hard">Moeilijk</option>
        </select>

        <div class="sort-controls">
          <select id="sort-by" class="select" aria-label="Sorteer op">
            <option value="name">Sorteren: Naam</option>
            <option value="hp">Sorteren: HP</option>
            <option value="attack">Sorteren: Aanval</option>
            <option value="defense">Sorteren: Verdediging</option>
            <option value="magic">Sorteren: Magie</option>
            <option value="difficulty">Sorteren: Moeilijkheid</option>
          </select>
          <button class="btn btn--icon sort-order-btn" id="btn-sort-order" data-order="asc" title="Volgorde" aria-label="Sorteervolgorde omdraaien">↑</button>
        </div>

        <button class="btn btn--ghost btn--sm" id="btn-reset-filters">Reset</button>
        <button class="btn btn--primary btn--sm" id="btn-random" title="Open een willekeurige champion">🎲 Willekeurig</button>
      </div>
    </section>

    <div class="results-bar">
      <p class="results-count" id="results-count">Laden…</p>
      <div class="view-toggle" role="group" aria-label="Weergave">
        <button class="btn btn--icon active" id="btn-view-cards" aria-pressed="true" aria-label="Kaartweergave" title="Kaartweergave">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </button>
        <button class="btn btn--icon" id="btn-view-table" aria-pressed="false" aria-label="Tabelweergave" title="Tabelweergave">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>

    <main class="main-content">

      <div class="state-display" id="loading" hidden>
        <div class="spinner"></div>
        <p>Champions laden…</p>
      </div>

      <div class="state-display" id="error-state" hidden>
        <span class="state-display__icon">⚠️</span>
        <p id="error-message">Er is een fout opgetreden.</p>
        <button class="btn btn--primary" id="btn-retry">Opnieuw proberen</button>
      </div>

      <div class="state-display" id="empty-state" hidden>
        <span class="state-display__icon">🔍</span>
        <p>Geen champions gevonden.</p>
        <button class="btn btn--ghost" id="btn-reset-empty">Reset filters</button>
      </div>

      <div class="champions-grid" id="champions-grid"></div>

      <div class="table-wrapper" id="table-wrapper" hidden>
        <table class="champions-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Champion</th>
              <th>Titel</th>
              <th>Rol(len)</th>
              <th>HP</th>
              <th>Aanval</th>
              <th>Verdediging</th>
              <th>Magie</th>
              <th>Moeilijkheid</th>
              <th>Favoriet</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>

      <!-- sentinel voor IntersectionObserver kaartanimaties -->
      <div id="scroll-sentinel"></div>

    </main>

    <aside class="favorites-panel" id="favorites-panel" aria-hidden="true">
      <div class="favorites-panel__header">
        <h2>❤️ Favorieten</h2>
        <button class="btn btn--icon" id="btn-close-favorites" aria-label="Sluiten">✕</button>
      </div>
      <div class="favorites-panel__body">
        <div id="favorites-list"></div>
        <p class="favorites-empty" id="favorites-empty" hidden>Nog geen favorieten.<br/><small>Klik op 🤍 bij een champion.</small></p>
      </div>
      <div class="favorites-panel__footer" id="favorites-footer" hidden>
        <button class="btn btn--danger-ghost btn--sm" id="btn-clear-favorites">🗑 Alles verwijderen</button>
      </div>
    </aside>

    <div class="overlay" id="overlay" hidden></div>

    <div class="modal" id="champion-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
      <div class="modal__content">
        <button class="btn btn--icon modal__close" id="btn-close-modal" aria-label="Sluiten">✕</button>
        <div class="modal__body" id="modal-body"></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
